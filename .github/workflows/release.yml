name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          echo "y" | sdkmanager "ndk;29.0.14206865"
          echo "y" | sdkmanager "cmake;4.3.2"
          echo "y" | sdkmanager "platforms;android-36"
          echo "y" | sdkmanager "build-tools;36.0.0"

      - name: Install Gradle 9.4.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          unzip -q gradle-9.4.1-bin.zip -d $HOME
          echo "$HOME/gradle-9.4.1/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> local.properties
          echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/4.3.2" >> local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > Backrooms/google-services.json

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --max-workers=2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Backrooms/build/outputs/apk/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
