name: Omni Backrooms CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;29.0.14206865"
          echo "y" | sdkmanager "platforms;android-36"
          echo "y" | sdkmanager "build-tools;36.0.0"

      - name: Install CMake 4.3.2
        run: |
          wget -q https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-x86_64.sh
          chmod +x cmake-4.3.2-linux-x86_64.sh
          sudo ./cmake-4.3.2-linux-x86_64.sh --skip-license --prefix=/usr/local
          cmake --version

      - name: Install Gradle 9.4.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          unzip -q gradle-9.4.1-bin.zip -d $HOME
          echo "$HOME/gradle-9.4.1/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "cmake.dir=/usr/local" >> local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > Backrooms/google-services.json

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --max-workers=2

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: omni-backrooms-debug
          path: Backrooms/build/outputs/apk/debug/*.apk
          retention-days: 30
