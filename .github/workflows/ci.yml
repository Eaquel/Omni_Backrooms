name: Omni Backrooms CI

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  NDK_VERSION: "29.0.14206865"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Xmx6g"

jobs:

  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.toml', '**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install CMake 4.3.2
        run: |
          curl -L -o cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-x86_64.tar.gz
          tar -xzf cmake.tar.gz
          echo "$PWD/cmake-4.3.2-linux-x86_64/bin" >> $GITHUB_PATH
          chmod +x $PWD/cmake-4.3.2-linux-x86_64/bin/cmake
          cmake --version

      - name: Cache NDK
        uses: actions/cache@v5
        with:
          path: Backrooms/.cxx
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Prepare Gradle Wrapper
        run: |
          sed -i "s|APP_HOME=.*|APP_HOME=\"$GITHUB_WORKSPACE\"|" gradlew
          chmod +x gradlew
          grep "APP_HOME" gradlew
          ls -lh "$GITHUB_WORKSPACE/Gradle/gradle-wrapper.jar"

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > Backrooms/google-services.json
            python3 -c "import json; json.load(open('Backrooms/google-services.json')); print('google-services.json geçerli')"
          else
            echo "HATA: GOOGLE_SERVICES_JSON secret boş!"
            exit 1
          fi

      - run: ./gradlew clean --refresh-dependencies
      - run: ./gradlew :Backrooms:lintDebug || true
      - run: ./gradlew :Backrooms:assembleDebug

      - uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          retention-days: 30
          path: Backrooms/build/outputs/apk/debug/*.apk


  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    needs: build-debug

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.toml', '**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install CMake 4.3.2
        run: |
          curl -L -o cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-x86_64.tar.gz
          tar -xzf cmake.tar.gz
          echo "$PWD/cmake-4.3.2-linux-x86_64/bin" >> $GITHUB_PATH
          chmod +x $PWD/cmake-4.3.2-linux-x86_64/bin/cmake
          cmake --version

      - name: Prepare Gradle Wrapper
        run: |
          sed -i "s|APP_HOME=.*|APP_HOME=\"$GITHUB_WORKSPACE\"|" gradlew
          chmod +x gradlew
          grep "APP_HOME" gradlew
          ls -lh "$GITHUB_WORKSPACE/Gradle/gradle-wrapper.jar"

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > Backrooms/google-services.json
            python3 -c "import json; json.load(open('Backrooms/google-services.json')); print('JSON geçerli')"
          else
            echo "HATA: GOOGLE_SERVICES_JSON secret boş!"
            exit 1
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > Eaquel.Keystore.jks
          {
            echo "storeFile=../../Eaquel.Keystore.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > keystore.properties

      - run: ./gradlew clean --refresh-dependencies
      - run: ./gradlew :Backrooms:bundleRelease
      - run: ./gradlew :Backrooms:assembleRelease

      - uses: actions/upload-artifact@v7
        with:
          name: release-aab
          retention-days: 90
          path: Backrooms/build/outputs/bundle/release/*.aab

      - uses: actions/upload-artifact@v7
        with:
          name: release-apk
          retention-days: 90
          path: Backrooms/build/outputs/apk/release/*.apk

      - run: ./gradlew :Backrooms:uploadCrashlyticsSymbolFileRelease || true


  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-debug

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.toml', '**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Prepare Gradle Wrapper
        run: |
          sed -i "s|APP_HOME=.*|APP_HOME=\"$GITHUB_WORKSPACE\"|" gradlew
          chmod +x gradlew
          grep "APP_HOME" gradlew
          ls -lh "$GITHUB_WORKSPACE/Gradle/gradle-wrapper.jar"

      - run: ./gradlew :Backrooms:detekt || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-results
          path: Backrooms/build/reports/**
