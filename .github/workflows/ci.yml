name: Omni Backrooms CI

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  NDK_VERSION: "29.0.14206865"
  CMAKE_VERSION: "4.3.2"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Xmx6g"

jobs:

  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v3-${{ hashFiles('**/*.toml', '**/*.gradle.kts', '**/*.kt') }}
          restore-keys: gradle-${{ runner.os }}-v3-

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install CMake ${{ env.CMAKE_VERSION }}
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "cmake;${{ env.CMAKE_VERSION }}"
          echo "SDK_CMAKE_DIR=$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}" >> $GITHUB_ENV
          "$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}/bin/cmake" --version

      - name: Prepare Gradle Wrapper
        run: |
          sed -i "s|APP_HOME=.*|APP_HOME=\"$GITHUB_WORKSPACE\"|" gradlew
          chmod +x gradlew

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > Backrooms/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > Eaquel.Keystore.jks
          {
            echo "storeFile=Eaquel.Keystore.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > keystore.properties

      - name: Clean
        run: ./gradlew clean --refresh-dependencies

      - name: Build Release
        run: |
          ./gradlew \
            :Backrooms:assembleRelease \
            :Backrooms:bundleRelease \

      - uses: actions/upload-artifact@v4
        with:
          name: release-build
          retention-days: 90
          path: |
            Backrooms/build/outputs/apk/release/*.apk
            Backrooms/build/outputs/bundle/release/*.aab

      - run: ./gradlew :Backrooms:uploadCrashlyticsSymbolFileRelease || true


  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v3-${{ hashFiles('**/*.toml', '**/*.gradle.kts', '**/*.kt') }}
          restore-keys: gradle-${{ runner.os }}-v3-

      - name: Prepare Gradle Wrapper
        run: |
          sed -i "s|APP_HOME=.*|APP_HOME=\"$GITHUB_WORKSPACE\"|" gradlew
          chmod +x gradlew

      - run: ./gradlew :Backrooms:detekt || true
