name: Omni Backrooms CI

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  NDK_VERSION: "29.0.14206865"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true -Xmx6g"

jobs:

  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install CMake 4.3.2
        run: |
          curl -L -o cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-x86_64.tar.gz
          tar -xzf cmake.tar.gz
          echo "$PWD/cmake-4.3.2-linux-x86_64/bin" >> $GITHUB_PATH
          chmod +x $PWD/cmake-4.3.2-linux-x86_64/bin/cmake
          cmake --version

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: Backrooms/.cxx
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cp Gradle/gradle-wrapper.jar        gradle/wrapper/gradle-wrapper.jar
          cp Gradle/gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ls -la gradle/wrapper/

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p Backrooms
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > Backrooms/google-services.json
          fi

      - run: ./gradlew clean
      - run: ./gradlew lint
      - run: ./gradlew :Backrooms:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          retention-days: 30
          path: Backrooms/build/outputs/apk/debug/*.apk


  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    needs: build-debug

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install CMake 4.3.2
        run: |
          curl -L -o cmake.tar.gz https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-linux-x86_64.tar.gz
          tar -xzf cmake.tar.gz
          echo "$PWD/cmake-4.3.2-linux-x86_64/bin" >> $GITHUB_PATH
          chmod +x $PWD/cmake-4.3.2-linux-x86_64/bin/cmake
          cmake --version

      - name: Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cp Gradle/gradle-wrapper.jar        gradle/wrapper/gradle-wrapper.jar
          cp Gradle/gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ls -la gradle/wrapper/

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p Backrooms
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > Backrooms/google-services.json
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > Eaquel.Keystore.jks
          {
            echo "storeFile=../../Eaquel.Keystore.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > keystore.properties

      - run: ./gradlew clean
      - run: ./gradlew :Backrooms:bundleRelease
      - run: ./gradlew :Backrooms:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          retention-days: 90
          path: Backrooms/build/outputs/bundle/release/*.aab

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          retention-days: 90
          path: Backrooms/build/outputs/apk/release/*.apk

      - run: ./gradlew :Backrooms:uploadCrashlyticsSymbolFileRelease || true


  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-debug

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cp Gradle/gradle-wrapper.jar        gradle/wrapper/gradle-wrapper.jar
          cp Gradle/gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ls -la gradle/wrapper/

      - run: ./gradlew :Backrooms:detekt || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: Backrooms/build/reports/**
