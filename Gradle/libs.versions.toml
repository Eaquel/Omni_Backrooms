[versions]
agp                     = "9.2.0"
kotlin                  = "2.3.21"
ksp                     = "2.3.21-2.0.1"
coreKtx                 = "1.16.0"
lifecycleRuntimeKtx     = "2.9.0"
activityCompose         = "1.10.1"
composeBom              = "2026.04.01"
navigationCompose       = "2.9.0"
hiltAndroid             = "2.59.2"
hiltNavigationCompose   = "1.2.0"
viewmodelCompose        = "2.9.0"
coroutines              = "1.10.1"
datastore               = "1.1.4"
retrofit                = "2.11.0"
okhttp                  = "4.12.0"
gson                    = "2.13.1"
coil                    = "2.7.0"
media3Exoplayer         = "1.10.0"
room                    = "2.8.4"
splashscreen            = "1.2.0"
lottie                  = "6.6.6"
accompanistPermissions  = "0.37.2"
agora                   = "4.6.3"

[libraries]
androidx-core-ktx                   = { group = "androidx.core",            name = "core-ktx",                      version.ref = "coreKtx" }
androidx-lifecycle-runtime-ktx      = { group = "androidx.lifecycle",       name = "lifecycle-runtime-ktx",         version.ref = "lifecycleRuntimeKtx" }
androidx-activity-compose           = { group = "androidx.activity",        name = "activity-compose",              version.ref = "activityCompose" }
androidx-compose-bom                = { group = "androidx.compose",         name = "compose-bom",                   version.ref = "composeBom" }
androidx-ui                         = { group = "androidx.compose.ui",      name = "ui" }
androidx-ui-graphics                = { group = "androidx.compose.ui",      name = "ui-graphics" }
androidx-ui-tooling                 = { group = "androidx.compose.ui",      name = "ui-tooling" }
androidx-ui-tooling-preview         = { group = "androidx.compose.ui",      name = "ui-tooling-preview" }
androidx-material3                  = { group = "androidx.compose.material3", name = "material3" }
androidx-material-icons-extended    = { group = "androidx.compose.material", name = "material-icons-extended" }
androidx-navigation-compose         = { group = "androidx.navigation",      name = "navigation-compose",            version.ref = "navigationCompose" }
androidx-lifecycle-viewmodel-compose= { group = "androidx.lifecycle",       name = "lifecycle-viewmodel-compose",   version.ref = "viewmodelCompose" }
androidx-lifecycle-runtime-compose  = { group = "androidx.lifecycle",       name = "lifecycle-runtime-compose",     version.ref = "viewmodelCompose" }
hilt-android                        = { group = "com.google.dagger",        name = "hilt-android",                  version.ref = "hiltAndroid" }
hilt-android-compiler               = { group = "com.google.dagger",        name = "hilt-android-compiler",         version.ref = "hiltAndroid" }
hilt-navigation-compose             = { group = "androidx.hilt",            name = "hilt-navigation-compose",       version.ref = "hiltNavigationCompose" }
kotlinx-coroutines-android          = { group = "org.jetbrains.kotlinx",   name = "kotlinx-coroutines-android",    version.ref = "coroutines" }
kotlinx-coroutines-core             = { group = "org.jetbrains.kotlinx",   name = "kotlinx-coroutines-core",       version.ref = "coroutines" }
androidx-datastore-preferences      = { group = "androidx.datastore",       name = "datastore-preferences",         version.ref = "datastore" }
retrofit                            = { group = "com.squareup.retrofit2",   name = "retrofit",                      version.ref = "retrofit" }
retrofit-converter-gson             = { group = "com.squareup.retrofit2",   name = "converter-gson",                version.ref = "retrofit" }
okhttp                              = { group = "com.squareup.okhttp3",     name = "okhttp",                        version.ref = "okhttp" }
okhttp-logging-interceptor          = { group = "com.squareup.okhttp3",     name = "logging-interceptor",           version.ref = "okhttp" }
gson                                = { group = "com.google.code.gson",     name = "gson",                          version.ref = "gson" }
coil-compose                        = { group = "io.coil-kt",               name = "coil-compose",                  version.ref = "coil" }
coil-video                          = { group = "io.coil-kt",               name = "coil-video",                    version.ref = "coil" }
media3-exoplayer                    = { group = "androidx.media3",          name = "media3-exoplayer",              version.ref = "media3Exoplayer" }
media3-ui                           = { group = "androidx.media3",          name = "media3-ui",                     version.ref = "media3Exoplayer" }
media3-exoplayer-hls                = { group = "androidx.media3",          name = "media3-exoplayer-hls",          version.ref = "media3Exoplayer" }
androidx-room-runtime               = { group = "androidx.room",            name = "room-runtime",                  version.ref = "room" }
androidx-room-ktx                   = { group = "androidx.room",            name = "room-ktx",                      version.ref = "room" }
androidx-room-compiler              = { group = "androidx.room",            name = "room-compiler",                 version.ref = "room" }
androidx-core-splashscreen          = { group = "androidx.core",            name = "core-splashscreen",             version.ref = "splashscreen" }
lottie-compose                      = { group = "com.airbnb.android",       name = "lottie-compose",                version.ref = "lottie" }
accompanist-permissions             = { group = "com.google.accompanist",   name = "accompanist-permissions",       version.ref = "accompanistPermissions" }
agora-rtc-full                      = { group = "io.agora.rtc",             name = "full-sdk",                      version.ref = "agora" }

[plugins]
android-application = { id = "com.android.application",            version.ref = "agp" }
kotlin-android      = { id = "org.jetbrains.kotlin.android",       version.ref = "kotlin" }
kotlin-compose      = { id = "org.jetbrains.kotlin.plugin.compose",version.ref = "kotlin" }
hilt-android        = { id = "com.google.dagger.hilt.android",     version.ref = "hiltAndroid" }
ksp                 = { id = "com.google.devtools.ksp",            version.ref = "ksp" }
